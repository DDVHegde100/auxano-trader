services:
  postgres:
    image: postgres:16-alpine
    container_name: auxano-pg
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: auxano
    volumes:
      - auxano_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auxano"]
      interval: 2s
      timeout: 5s
      retries: 15

volumes:
  auxano_pg_data:
